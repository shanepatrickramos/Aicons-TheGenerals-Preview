<!-- @dsCard group="Type" viewport="700x180" name="Display Type" subtitle="Hero and section heading styles" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:#0E0E0E; padding:20px 24px; font-family:'Montserrat',sans-serif; display:flex; flex-direction:column; gap:12px; }
  .hero { font-size:52px; font-weight:900; text-transform:uppercase; letter-spacing:0.03em; line-height:1; background:linear-gradient(110deg,#C9961A 0%,#C9961A 35%,#FFF6DA 48%,#FFF 50%,#FFF6DA 52%,#F5C842 65%,#C9961A 100%);background-size:220% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
  .section { font-size:28px; font-weight:900; text-transform:uppercase; letter-spacing:0.03em; line-height:1; color:#FFF; }
  .eyebrow { font-size:9px; font-weight:700; letter-spacing:0.4em; text-transform:uppercase; color:#C9961A; }
  .row { display:flex; align-items:baseline; gap:16px; }
  .meta { font-size:8px; color:#4A4035; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; white-space:nowrap; }
</style>
</head>
<body>
  <div class="eyebrow">The Generals AICONS — Eyebrow · 9px / 700 / 0.4em</div>
  <div class="row">
    <div class="hero">Join the Generals</div>
    <div class="meta">52px / Black 900 / sweep gradient</div>
  </div>
  <div class="row">
    <div class="section">Our Leaders</div>
    <div class="meta">28px / Black 900 / white</div>
  </div>
</body>
</html>
