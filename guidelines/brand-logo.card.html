<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:#080808; display:flex; align-items:center; justify-content:space-between; padding:16px 40px; font-family:'Montserrat',sans-serif; }
  img { height:160px; width:auto; object-fit:contain; }
  .info { display:flex; flex-direction:column; gap:10px; }
  .row { display:flex; gap:8px; align-items:center; }
  .dot { width:32px; height:32px; flex-shrink:0; }
  .lbl { font-size:8px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:#7A7060; }
  .val { font-size:9px; font-weight:500; color:#C9961A; letter-spacing:0.05em; }
</style>
</head>
<body>
  <img src="../assets/logo-dark.jpg" alt="The Generals AICONS logo" />
  <div class="info">
    <div class="row"><div class="dot" style="background:#F5C842"></div><div><div class="lbl">Gold Bright</div><div class="val">#F5C842</div></div></div>
    <div class="row"><div class="dot" style="background:#C9961A"></div><div><div class="lbl">Gold Mid</div><div class="val">#C9961A</div></div></div>
    <div class="row"><div class="dot" style="background:#9B1A0A"></div><div><div class="lbl">Red Brand</div><div class="val">#9B1A0A</div></div></div>
    <div class="row"><div class="dot" style="background:#080808;border:1px solid #333"></div><div><div class="lbl">Black BG</div><div class="val">#080808</div></div></div>
  </div>
</body>
</html>
