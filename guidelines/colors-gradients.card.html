<!-- @dsCard group="Colors" viewport="700x160" name="Gold Gradients" subtitle="Named gradients used throughout the brand" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:#0E0E0E; display:flex; gap:8px; padding:20px 24px; font-family:'Montserrat',sans-serif; align-items:stretch; }
  .grad { flex:1; height:80px; display:flex; align-items:flex-end; padding:6px 8px; }
  .grad-label { font-size:8px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:rgba(0,0,0,0.7); }
  .text-sample { height:80px; flex:1; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:900; letter-spacing:0.03em; text-transform:uppercase; }
</style>
</head>
<body>
  <div class="grad" style="background:linear-gradient(135deg,#C9961A,#F5C842)"><span class="grad-label">Gold Shine</span></div>
  <div class="grad" style="background:linear-gradient(180deg,#FDEEA0 0%,#C9961A 100%)"><span class="grad-label" style="color:rgba(0,0,0,0.5)">Name Grad</span></div>
  <div class="grad" style="background:linear-gradient(180deg,#FDEEA0 0%,#C9961A 45%,#7A5606 100%)"><span class="grad-label" style="color:rgba(0,0,0,0.5)">Hero Title</span></div>
  <div class="text-sample" style="background:linear-gradient(110deg,#C9961A 0%,#C9961A 35%,#FFF6DA 48%,#FFF 50%,#FFF6DA 52%,#F5C842 65%,#C9961A 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">GENERALS</div>
</body>
</html>
