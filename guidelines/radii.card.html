<!-- @dsCard group="Spacing" viewport="700x160" name="Borders & Radii" subtitle="Sharp corners brand default + radii scale" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:#0E0E0E; padding:20px 24px; font-family:'Montserrat',sans-serif; display:flex; gap:12px; align-items:center; }
  .box { width:68px; height:68px; border:1px solid rgba(197,148,26,0.4); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; flex-shrink:0; }
  .r-label { font-size:8px; font-weight:700; color:#C9961A; letter-spacing:0.08em; text-transform:uppercase; }
  .r-val { font-size:7px; color:#4A4035; font-weight:500; }
  .border-demo { flex:1; display:flex; flex-direction:column; gap:8px; justify-content:center; }
  .bd { height:16px; }
  .bd-label { font-size:8px; font-weight:600; color:#7A7060; letter-spacing:0.1em; text-transform:uppercase; }
</style>
</head>
<body>
  <div class="box" style="border-radius:0"><div class="r-label">None</div><div class="r-val">0px ★ default</div></div>
  <div class="box" style="border-radius:2px"><div class="r-label">SM</div><div class="r-val">2px</div></div>
  <div class="box" style="border-radius:4px"><div class="r-label">MD</div><div class="r-val">4px</div></div>
  <div class="box" style="border-radius:8px"><div class="r-label">LG</div><div class="r-val">8px</div></div>
  <div class="box" style="border-radius:12px"><div class="r-label">XL</div><div class="r-val">12px</div></div>
  <div class="box" style="border-radius:9999px"><div class="r-label">Full</div><div class="r-val">pill</div></div>
  <div class="border-demo">
    <div><div class="bd" style="border:1px solid rgba(197,148,26,0.18)"></div><div class="bd-label">Border default — rgba(197,148,26,0.18)</div></div>
    <div><div class="bd" style="border:1px solid rgba(197,148,26,0.35)"></div><div class="bd-label">Border medium — 0.35</div></div>
    <div><div class="bd" style="border:1px solid rgba(245,200,66,0.55)"></div><div class="bd-label">Border high — rgba(245,200,66,0.55)</div></div>
  </div>
</body>
</html>
