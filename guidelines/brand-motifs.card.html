<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:#0E0E0E; padding:20px 32px; font-family:'Montserrat',sans-serif; display:flex; flex-direction:column; gap:14px; justify-content:center; }
  .row { display:flex; align-items:center; gap:24px; }
  .tagline { font-size:13px; font-weight:700; letter-spacing:0.5em; text-transform:uppercase; color:#7A7060; }
  .stars { font-size:22px; color:#F5C842; letter-spacing:6px; filter:drop-shadow(0 0 6px rgba(245,200,66,0.5)); }
  .bracket { position:relative; width:60px; height:48px; }
  .bracket::before { content:''; position:absolute; top:0; left:0; width:14px; height:14px; border-top:2px solid #F5C842; border-left:2px solid #F5C842; }
  .bracket::after  { content:''; position:absolute; bottom:0; right:0; width:14px; height:14px; border-bottom:2px solid #F5C842; border-right:2px solid #F5C842; }
  .sep { flex:1; height:1px; background:linear-gradient(90deg,transparent,#C9961A 30%,#F5C842 50%,#C9961A 70%,transparent); }
  .pill { padding:4px 12px; border:1px solid rgba(197,148,26,0.4); font-size:8px; font-weight:800; letter-spacing:0.2em; text-transform:uppercase; color:#C9961A; }
</style>
</head>
<body>
  <div class="row">
    <div class="stars">★ ★ ★ ★ ★ ★ ★</div>
    <div class="pill">Diamond Rank</div>
    <div class="pill" style="background:#9B1A0A;border-color:#9B1A0A;color:#F5C842">Commander</div>
  </div>
  <div class="row">
    <div class="sep"></div>
  </div>
  <div class="row">
    <div class="bracket"></div>
    <div class="tagline">Lead &nbsp;·&nbsp; Conquer &nbsp;·&nbsp; Dominate</div>
    <div class="bracket"></div>
  </div>
</body>
</html>
