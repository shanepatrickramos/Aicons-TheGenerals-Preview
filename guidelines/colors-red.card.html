<!-- @dsCard group="Colors" viewport="700x160" name="Red Palette" subtitle="Brand red — crimson to vivid" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:#0E0E0E; display:flex; align-items:center; padding:20px 24px; font-family:'Montserrat',sans-serif; gap:16px; }
  .swatches { display:flex; gap:0; height:80px; }
  .sw { width:120px; display:flex; flex-direction:column; justify-content:flex-end; padding:0 0 6px 6px; }
  .sw-label { font-size:9px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#FFF; line-height:1.3; }
  .sw-val { font-size:7px; font-weight:500; color:rgba(255,255,255,0.6); letter-spacing:0.05em; }
  .meta { flex:1; display:flex; flex-direction:column; gap:10px; justify-content:center; }
  .usage { font-size:9px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; padding:5px 10px; border:1px solid rgba(197,148,26,0.2); color:#C9961A; }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw" style="background:#9B1A0A"><span class="sw-label">Brand Red</span><span class="sw-val">#9B1A0A</span></div>
    <div class="sw" style="background:#C0281A"><span class="sw-label">Vivid Red</span><span class="sw-val">#C0281A</span></div>
    <div class="sw" style="background:#7A1208"><span class="sw-label">Dark Red</span><span class="sw-val">#7A1208</span></div>
  </div>
  <div class="meta">
    <div class="usage">Badges · AICONS Wordmark · Subheadings</div>
    <div class="usage">Hover states on red elements</div>
    <div class="usage">Section separators · Alert indicators</div>
  </div>
</body>
</html>
