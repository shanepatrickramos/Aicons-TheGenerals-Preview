<!-- @dsCard group="Colors" viewport="700x160" name="Gold Palette" subtitle="Brand gold — 8-stop scale from tint to deep" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:#0E0E0E; display:flex; align-items:center; padding:20px 24px; font-family:'Montserrat',sans-serif; gap:0; }
  .swatches { display:flex; gap:0; flex:1; height:80px; overflow:hidden; }
  .sw { flex:1; display:flex; flex-direction:column; justify-content:flex-end; padding:0 0 6px 6px; min-width:0; }
  .sw-label { font-size:8px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; line-height:1.2; }
  .sw-val { font-size:7px; font-weight:500; opacity:0.6; letter-spacing:0.05em; }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw" style="background:#FDEEA0"><span class="sw-label" style="color:#1C1100">50</span><span class="sw-val" style="color:#1C1100">#FDEEA0</span></div>
    <div class="sw" style="background:#F5C842"><span class="sw-label" style="color:#1C1100">200</span><span class="sw-val" style="color:#1C1100">#F5C842</span></div>
    <div class="sw" style="background:#E8B820"><span class="sw-label" style="color:#1C1100">300</span><span class="sw-val" style="color:#1C1100">#E8B820</span></div>
    <div class="sw" style="background:#C9961A"><span class="sw-label" style="color:#1C1100">400</span><span class="sw-val" style="color:#1C1100">#C9961A</span></div>
    <div class="sw" style="background:#A6790A"><span class="sw-label" style="color:#FFF">500</span><span class="sw-val" style="color:#FFF">#A6790A</span></div>
    <div class="sw" style="background:#8B6310"><span class="sw-label" style="color:#FFF">600</span><span class="sw-val" style="color:#FFF">#8B6310</span></div>
    <div class="sw" style="background:#7A5606"><span class="sw-label" style="color:#FFF">700</span><span class="sw-val" style="color:#FFF">#7A5606</span></div>
    <div class="sw" style="background:#6E5106"><span class="sw-label" style="color:#FFF">800</span><span class="sw-val" style="color:#FFF">#6E5106</span></div>
  </div>
</body>
</html>
