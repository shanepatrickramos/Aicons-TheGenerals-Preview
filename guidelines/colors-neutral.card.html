<!-- @dsCard group="Colors" viewport="700x160" name="Neutral Palette" subtitle="Dark mode blacks to light mode ivory" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:#0E0E0E; display:flex; align-items:center; padding:20px 24px; font-family:'Montserrat',sans-serif; }
  .swatches { display:flex; gap:0; flex:1; height:80px; }
  .sw { flex:1; display:flex; flex-direction:column; justify-content:flex-end; padding:0 0 6px 6px; min-width:0; border:1px solid rgba(255,255,255,0.05); }
  .sw-label { font-size:8px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; line-height:1.3; }
  .sw-val { font-size:7px; font-weight:500; opacity:0.55; letter-spacing:0.03em; }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw" style="background:#080808"><span class="sw-label" style="color:#7A7060">Black</span><span class="sw-val" style="color:#7A7060">#080808</span></div>
    <div class="sw" style="background:#0E0E0E"><span class="sw-label" style="color:#7A7060">Card</span><span class="sw-val" style="color:#7A7060">#0E0E0E</span></div>
    <div class="sw" style="background:#161616"><span class="sw-label" style="color:#7A7060">Lift</span><span class="sw-val" style="color:#7A7060">#161616</span></div>
    <div class="sw" style="background:#7A7060"><span class="sw-label" style="color:#FFF">Muted</span><span class="sw-val" style="color:#FFF">#7A7060</span></div>
    <div class="sw" style="background:#4A4035"><span class="sw-label" style="color:#FFF">Dim</span><span class="sw-val" style="color:#FFF">#4A4035</span></div>
    <div class="sw" style="background:#EAE2D0"><span class="sw-label" style="color:#1C1100">Ivory</span><span class="sw-val" style="color:#1C1100">#EAE2D0</span></div>
    <div class="sw" style="background:#F4EEE1"><span class="sw-label" style="color:#1C1100">Page Lt</span><span class="sw-val" style="color:#1C1100">#F4EEE1</span></div>
    <div class="sw" style="background:#FFFFFF; border:1px solid #E0D8C8"><span class="sw-label" style="color:#1C1100">White</span><span class="sw-val" style="color:#1C1100">#FFFFFF</span></div>
  </div>
</body>
</html>
