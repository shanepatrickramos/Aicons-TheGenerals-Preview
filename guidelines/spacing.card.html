<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base grid — space-1 through space-16" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:#0E0E0E; padding:20px 24px; font-family:'Montserrat',sans-serif; display:flex; align-items:flex-end; gap:8px; }
  .sp { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .bar { background:linear-gradient(to top, #C9961A, #F5C842); width:20px; }
  .lbl { font-size:7px; font-weight:700; color:#7A7060; letter-spacing:0.1em; text-transform:uppercase; }
  .val { font-size:7px; font-weight:500; color:#4A4035; }
</style>
</head>
<body>
  <div class="sp"><div class="bar" style="height:4px"></div><div class="lbl">1</div><div class="val">4px</div></div>
  <div class="sp"><div class="bar" style="height:8px"></div><div class="lbl">2</div><div class="val">8</div></div>
  <div class="sp"><div class="bar" style="height:12px"></div><div class="lbl">3</div><div class="val">12</div></div>
  <div class="sp"><div class="bar" style="height:16px"></div><div class="lbl">4</div><div class="val">16</div></div>
  <div class="sp"><div class="bar" style="height:20px"></div><div class="lbl">5</div><div class="val">20</div></div>
  <div class="sp"><div class="bar" style="height:24px"></div><div class="lbl">6</div><div class="val">24</div></div>
  <div class="sp"><div class="bar" style="height:32px"></div><div class="lbl">8</div><div class="val">32</div></div>
  <div class="sp"><div class="bar" style="height:40px"></div><div class="lbl">10</div><div class="val">40</div></div>
  <div class="sp"><div class="bar" style="height:48px"></div><div class="lbl">12</div><div class="val">48</div></div>
  <div class="sp"><div class="bar" style="height:64px"></div><div class="lbl">16</div><div class="val">64</div></div>
  <div class="sp"><div class="bar" style="height:80px"></div><div class="lbl">20</div><div class="val">80</div></div>
  <div class="sp"><div class="bar" style="height:96px"></div><div class="lbl">24</div><div class="val">96</div></div>
</body>
</html>
